name: JFrog OIDC Test
on: 
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  test-oidc:
    runs-on: ubuntu-latest
    environment: dev  # Required to match the customer's "environment": "dev" claim
    steps:
      - name: Setup JFrog CLI
        uses: jfrog/setup-jfrog-cli@v4
        env:
          JF_URL: https://hts2.jfrog.io/
        with:
          oidc-provider-name: my-oidc-config
          oidc-audience: aden-artifactory-oidc  # Updated to match customer
