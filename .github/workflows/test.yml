name: JFrog OIDC Error Replication
on: 
  workflow_dispatch:
    inputs:
      use_open_id_connect:
        description: 'Use OIDC'
        default: true
        type: boolean

permissions:
  id-token: write
  contents: read

jobs:
  test-oidc:
    runs-on: ubuntu-latest
    # Ensure this matches your GitHub Environment name
    environment: dev 
    steps:
      - name: Setup JFrog CLI (Force Buggy Version)
        if: ${{ inputs.use_open_id_connect }}
        uses: jfrog/setup-jfrog-cli@v4
        id: jfrog-oidc
        env:
          JF_URL: ${{ vars.ADEN_SERVER_JFROG_URL }}
        with:
          # Forcing 2.100.0 triggers the "2.100.0 < 2.75.0" logic error
          version: 2.100.0
          oidc-provider-name: ${{ vars.ADEN_OIDC_PROVIDER }}
          oidc-audience: ${{ vars.ADEN_OIDC_AUDIENCE }}

      - name: Store OIDC user and token
        run: |
          echo "OIDC_USER=${{ steps.jfrog-oidc.outputs.oidc-user }}" >> $GITHUB_ENV
          echo "OIDC_TOKEN=${{ steps.jfrog-oidc.outputs.oidc-token }}" >> $GITHUB_ENV

      - name: Test Deployment Permissions
        run: |
          echo "Testing deployment as $OIDC_USER"
          echo "This step will likely fail or skip if the setup task errored out."
          echo "replicate error" > new.txt
          jf rt upload new.txt czm-aden-generic-local/
